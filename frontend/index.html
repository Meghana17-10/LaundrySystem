<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LaundryPro</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; color: #1a202c; min-height: 100vh; }

    /* ── Auth ── */
    #auth-screen {
      display: flex; align-items: center; justify-content: center; min-height: 100vh;
    }
    .auth-card {
      background: #fff; border-radius: 12px; padding: 40px 36px; width: 360px;
      box-shadow: 0 4px 24px rgba(0,0,0,.10); max-width: 100%;
    }
    .auth-card h1 { font-size: 1.6rem; margin-bottom: 6px; color: #2b6cb0; }
    .auth-card p  { font-size: .85rem; color: #718096; margin-bottom: 24px; }
    .auth-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .auth-tabs button {
      flex: 1; padding: 8px; border: 2px solid #e2e8f0; border-radius: 8px;
      background: #fff; cursor: pointer; font-size: .9rem; transition: all .2s;
    }
    .auth-tabs button.active { border-color: #2b6cb0; background: #ebf4ff; color: #2b6cb0; font-weight: 600; }

    /* ── Shared form ── */
    label { display: block; font-size: .82rem; font-weight: 600; color: #4a5568; margin-bottom: 4px; margin-top: 14px; }
    input, select {
      width: 100%; padding: 9px 12px; border: 1.5px solid #e2e8f0; border-radius: 8px;
      font-size: .9rem; outline: none; transition: border .2s;
    }
    input:focus, select:focus { border-color: #2b6cb0; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 18px; border: none; border-radius: 8px; cursor: pointer;
      font-size: .88rem; font-weight: 600; transition: opacity .2s;
    }
    .btn:hover { opacity: .88; }
    .btn-primary  { background: #2b6cb0; color: #fff; }
    .btn-success  { background: #38a169; color: #fff; }
    .btn-danger   { background: #e53e3e; color: #fff; }
    .btn-sm       { padding: 5px 12px; font-size: .8rem; }
    .btn-full     { width: 100%; justify-content: center; margin-top: 18px; }
    .error-msg    { color: #e53e3e; font-size: .82rem; margin-top: 10px; min-height: 18px; }

    /* ── App shell ── */
    #app-screen { display: none; }
    nav {
      background: #2b6cb0; color: #fff; padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between; height: 56px;
    }
    nav .brand { font-size: 1.2rem; font-weight: 700; letter-spacing: .5px; }
    nav .nav-links { display: flex; gap: 4px; }
    nav .nav-links button {
      background: transparent; border: none; color: rgba(255,255,255,.75);
      padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: .88rem; font-weight: 500;
      transition: all .2s;
    }
    nav .nav-links button.active, nav .nav-links button:hover { background: rgba(255,255,255,.18); color: #fff; }
    nav .user-info { font-size: .82rem; opacity: .85; display: flex; align-items: center; gap: 10px; }
    nav .user-info button { background: rgba(255,255,255,.2); border: none; color: #fff; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: .8rem; }

    /* ── Bottom nav (mobile) ── */
    .bottom-nav {
      display: none; position: fixed; bottom: 0; left: 0; right: 0;
      background: #2b6cb0; height: 56px; z-index: 50;
      justify-content: space-around; align-items: center;
    }
    .bottom-nav button {
      background: transparent; border: none; color: rgba(255,255,255,.75);
      font-size: .75rem; font-weight: 600; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 6px 12px;
    }
    .bottom-nav button.active { color: #fff; }
    .bottom-nav button span.icon { font-size: 1.2rem; }

    .page { display: none; padding: 28px 24px; max-width: 1100px; margin: 0 auto; }
    .page.active { display: block; }

    /* ── Responsive table ── */
    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 10px; }

    /* ── Dashboard ── */
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
    .stat-card {
      background: #fff; border-radius: 10px; padding: 20px 22px;
      box-shadow: 0 2px 8px rgba(0,0,0,.07);
    }
    .stat-card .label { font-size: .78rem; color: #718096; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
    .stat-card .value { font-size: 2rem; font-weight: 700; margin-top: 6px; color: #2b6cb0; }
    .stat-card .value.green  { color: #38a169; }
    .stat-card .value.orange { color: #dd6b20; }
    .stat-card .value.purple { color: #805ad5; }

    /* ── Orders page ── */
    .toolbar { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; align-items: flex-end; }
    .toolbar input, .toolbar select { width: auto; flex: 1; min-width: 140px; }
    .toolbar .btn { flex-shrink: 0; }

    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.07); }
    th { background: #ebf4ff; color: #2b6cb0; font-size: .78rem; text-transform: uppercase; letter-spacing: .5px; padding: 12px 14px; text-align: left; }
    td { padding: 11px 14px; font-size: .88rem; border-top: 1px solid #f0f4f8; vertical-align: middle; }
    tr:hover td { background: #f7fafc; }

    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: .75rem; font-weight: 700;
    }
    .badge-RECEIVED   { background: #bee3f8; color: #2c5282; }
    .badge-PROCESSING { background: #fefcbf; color: #744210; }
    .badge-READY      { background: #c6f6d5; color: #22543d; }
    .badge-DELIVERED  { background: #e9d8fd; color: #44337a; }

    /* ── Create Order ── */
    .form-card { background: #fff; border-radius: 10px; padding: 28px; box-shadow: 0 2px 8px rgba(0,0,0,.07); max-width: 640px; }
    .garment-row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
    .garment-row select { flex: 2; }
    .garment-row input  { flex: 1; }
    .garment-row button { flex-shrink: 0; }
    #bill-preview { margin-top: 18px; background: #f7fafc; border-radius: 8px; padding: 14px 16px; font-size: .88rem; }
    #bill-preview table { box-shadow: none; border-radius: 0; }
    #bill-preview th, #bill-preview td { padding: 6px 10px; }
    .total-row td { font-weight: 700; color: #2b6cb0; border-top: 2px solid #e2e8f0 !important; }

    /* ── Modal ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45);
      align-items: center; justify-content: center; z-index: 100;
    }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; border-radius: 12px; padding: 28px; width: 360px; max-width: calc(100vw - 32px); box-shadow: 0 8px 32px rgba(0,0,0,.18); }
    .modal h3 { margin-bottom: 16px; }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }

    .page-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 20px; color: #2d3748; }
    .empty { text-align: center; padding: 40px; color: #a0aec0; font-size: .95rem; }

    @media (max-width: 600px) {
      #auth-screen { padding: 16px; }
      .auth-card { padding: 28px 20px; width: 100%; }
      nav .nav-links, nav .user-info span { display: none; }
      nav .user-info button { display: none; }
      .bottom-nav { display: flex; }
      .page { padding: 16px 12px 72px; }
      .stat-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .stat-card { padding: 14px 16px; }
      .stat-card .value { font-size: 1.5rem; }
      .toolbar { gap: 8px; }
      .toolbar input, .toolbar select { min-width: 100%; flex: unset; }
      .form-card { padding: 18px 14px; }
      .garment-row { flex-wrap: wrap; }
      .garment-row select { flex: 1 1 100%; }
      .garment-row input  { flex: 1; }
    }
  </style>
</head>
<body>

<!-- ══════════════ AUTH SCREEN ══════════════ -->
<div id="auth-screen">
  <div class="auth-card">
    <h1>🧺 LaundryPro</h1>
    <p>Dry Cleaning Order Management</p>
    <div class="auth-tabs">
      <button class="active" onclick="switchTab('login')">Login</button>
      <button onclick="switchTab('register')">Register</button>
    </div>
    <div id="login-form">
      <label>Username</label>
      <input id="login-user" type="text" placeholder="Enter username" />
      <label>Password</label>
      <input id="login-pass" type="password" placeholder="Enter password" />
      <button class="btn btn-primary btn-full" onclick="doLogin()">Login</button>
    </div>
    <div id="register-form" style="display:none">
      <label>Username</label>
      <input id="reg-user" type="text" placeholder="Choose username" />
      <label>Password</label>
      <input id="reg-pass" type="password" placeholder="Min 6 characters" />
      <button class="btn btn-success btn-full" onclick="doRegister()">Create Account</button>
    </div>
    <div class="error-msg" id="auth-error"></div>
  </div>
</div>

<!-- ══════════════ APP SCREEN ══════════════ -->
<div id="app-screen">
  <nav>
    <span class="brand">🧺 LaundryPro</span>
    <div class="nav-links">
      <button class="active" onclick="showPage('dashboard')">Dashboard</button>
      <button onclick="showPage('orders')">Orders</button>
      <button onclick="showPage('create')">+ New Order</button>
    </div>
    <div class="user-info">
      <span id="nav-username"></span>
      <button onclick="logout()">Logout</button>
    </div>
  </nav>

  <!-- Mobile bottom nav -->
  <div class="bottom-nav" id="bottom-nav">
    <button class="active" onclick="showPage('dashboard')"><span class="icon">📊</span>Dashboard</button>
    <button onclick="showPage('orders')"><span class="icon">📋</span>Orders</button>
    <button onclick="showPage('create')"><span class="icon">➕</span>New Order</button>
    <button onclick="logout()"><span class="icon">🚪</span>Logout</button>
  </div>

  <!-- Dashboard -->
  <div class="page active" id="page-dashboard">
    <div class="page-title">Dashboard</div>
    <div class="stat-grid">
      <div class="stat-card"><div class="label">Total Orders</div><div class="value" id="d-total">—</div></div>
      <div class="stat-card"><div class="label">Total Revenue</div><div class="value green" id="d-revenue">—</div></div>
      <div class="stat-card"><div class="label">Received</div><div class="value" id="d-received">—</div></div>
      <div class="stat-card"><div class="label">Processing</div><div class="value orange" id="d-processing">—</div></div>
      <div class="stat-card"><div class="label">Ready</div><div class="value green" id="d-ready">—</div></div>
      <div class="stat-card"><div class="label">Delivered</div><div class="value purple" id="d-delivered">—</div></div>
    </div>
  </div>

  <!-- Orders List -->
  <div class="page" id="page-orders">
    <div class="page-title">All Orders</div>
    <div class="toolbar">
      <input id="f-name"    type="text"   placeholder="Search by name…" oninput="loadOrders()" />
      <input id="f-phone"   type="text"   placeholder="Search by phone…" oninput="loadOrders()" />
      <input id="f-garment" type="text"   placeholder="Search by garment…" oninput="loadOrders()" />
      <select id="f-status" onchange="loadOrders()">
        <option value="">All Statuses</option>
        <option>RECEIVED</option><option>PROCESSING</option><option>READY</option><option>DELIVERED</option>
      </select>
      <button class="btn btn-primary btn-sm" onclick="loadOrders()">🔍 Search</button>
    </div>
    <div id="orders-table-wrap" class="table-wrap"></div>
  </div>

  <!-- Create Order -->
  <div class="page" id="page-create">
    <div class="page-title">New Order</div>
    <div class="form-card">
      <label>Customer Name</label>
      <input id="c-name" type="text" placeholder="Full name" />
      <label>Phone Number</label>
      <input id="c-phone" type="tel" placeholder="10-digit number" />

      <label style="margin-top:18px">Garments</label>
      <div id="garment-rows"></div>
      <button class="btn btn-sm" style="background:#e2e8f0;color:#4a5568;margin-top:6px" onclick="addGarmentRow()">+ Add Garment</button>

      <div id="bill-preview" style="display:none"></div>
      <div class="error-msg" id="create-error"></div>
      <div style="display:flex;gap:10px;margin-top:18px">
        <button class="btn btn-primary" onclick="previewBill()">Preview Bill</button>
        <button class="btn btn-success" onclick="submitOrder()">✓ Place Order</button>
      </div>
    </div>
  </div>
</div>

<!-- Status Update Modal -->
<div class="modal-overlay" id="status-modal">
  <div class="modal">
    <h3>Update Order Status</h3>
    <label>Order ID</label>
    <input id="modal-order-id" readonly style="background:#f7fafc" />
    <label>New Status</label>
    <select id="modal-status">
      <option>RECEIVED</option><option>PROCESSING</option><option>READY</option><option>DELIVERED</option>
    </select>
    <div class="modal-actions">
      <button class="btn" style="background:#e2e8f0;color:#4a5568" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="confirmStatusUpdate()">Update</button>
    </div>
  </div>
</div>

<script>
const API = '';  // same origin
let token = localStorage.getItem('lp_token') || '';
let username = localStorage.getItem('lp_user') || '';
let prices = {};

// ── Boot ──────────────────────────────────────────────
window.onload = () => {
  if (token) enterApp();
};

function enterApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  document.getElementById('nav-username').textContent = username;
  fetchPrices();
  loadDashboard();
}

// ── Auth ──────────────────────────────────────────────
function switchTab(tab) {
  document.getElementById('login-form').style.display    = tab === 'login'    ? '' : 'none';
  document.getElementById('register-form').style.display = tab === 'register' ? '' : 'none';
  document.querySelectorAll('.auth-tabs button').forEach((b, i) => b.classList.toggle('active', (i === 0) === (tab === 'login')));
  document.getElementById('auth-error').textContent = '';
}

async function doLogin() {
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value;
  const res = await apiFetch('/api/auth/login', 'POST', { username: u, password: p }, false);
  if (res.error) { document.getElementById('auth-error').textContent = res.error; return; }
  token = res.token; username = res.username;
  localStorage.setItem('lp_token', token);
  localStorage.setItem('lp_user', username);
  enterApp();
}

async function doRegister() {
  const u = document.getElementById('reg-user').value.trim();
  const p = document.getElementById('reg-pass').value;
  const res = await apiFetch('/api/auth/register', 'POST', { username: u, password: p }, false);
  if (res.error) { document.getElementById('auth-error').textContent = res.error; return; }
  token = res.token; username = res.username;
  localStorage.setItem('lp_token', token);
  localStorage.setItem('lp_user', username);
  enterApp();
}

function logout() {
  token = ''; username = '';
  localStorage.removeItem('lp_token');
  localStorage.removeItem('lp_user');
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
}

// ── Navigation ────────────────────────────────────────
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-links button').forEach((b, i) => {
    b.classList.toggle('active', ['dashboard','orders','create'][i] === name);
  });
  document.querySelectorAll('.bottom-nav button').forEach((b, i) => {
    b.classList.toggle('active', ['dashboard','orders','create'][i] === name);
  });
  document.getElementById('page-' + name).classList.add('active');
  if (name === 'dashboard') loadDashboard();
  if (name === 'orders')    loadOrders();
  if (name === 'create')    initCreateForm();
}

// ── Dashboard ─────────────────────────────────────────
async function loadDashboard() {
  const d = await apiFetch('/api/dashboard');
  if (d.error) return;
  document.getElementById('d-total').textContent      = d.total_orders;
  document.getElementById('d-revenue').textContent    = '₹' + d.total_revenue.toLocaleString('en-IN');
  document.getElementById('d-received').textContent   = d.orders_per_status.RECEIVED;
  document.getElementById('d-processing').textContent = d.orders_per_status.PROCESSING;
  document.getElementById('d-ready').textContent      = d.orders_per_status.READY;
  document.getElementById('d-delivered').textContent  = d.orders_per_status.DELIVERED;
}

// ── Orders List ───────────────────────────────────────
async function loadOrders() {
  const params = new URLSearchParams();
  const name    = document.getElementById('f-name')?.value.trim();
  const phone   = document.getElementById('f-phone')?.value.trim();
  const garment = document.getElementById('f-garment')?.value.trim();
  const status  = document.getElementById('f-status')?.value;
  if (name)    params.set('name', name);
  if (phone)   params.set('phone', phone);
  if (garment) params.set('garment', garment);
  if (status)  params.set('status', status);

  const orders = await apiFetch('/api/orders?' + params.toString());
  const wrap = document.getElementById('orders-table-wrap');

  if (!orders.length) { wrap.innerHTML = '<div class="empty">No orders found.</div>'; return; }

  wrap.innerHTML = `
    <table>
      <thead><tr>
        <th>Order ID</th><th>Customer</th><th>Phone</th>
        <th>Garments</th><th>Total</th><th>Status</th>
        <th>Est. Delivery</th><th>Action</th>
      </tr></thead>
      <tbody>
        ${orders.map(o => `
          <tr>
            <td><code>${o.order_id}</code></td>
            <td>${o.customer_name}</td>
            <td>${o.phone}</td>
            <td>${o.garments.map(g => `${g.name} ×${g.quantity}`).join(', ')}</td>
            <td>₹${o.total_amount.toLocaleString('en-IN')}</td>
            <td><span class="badge badge-${o.status}">${o.status}</span></td>
            <td>${o.estimated_delivery || '—'}</td>
            <td><button class="btn btn-primary btn-sm" onclick="openModal('${o.order_id}','${o.status}')">Update</button></td>
          </tr>`).join('')}
      </tbody>
    </table>`;
}

// ── Create Order ──────────────────────────────────────
async function fetchPrices() {
  prices = await apiFetch('/api/orders/prices');
}

function initCreateForm() {
  document.getElementById('c-name').value  = '';
  document.getElementById('c-phone').value = '';
  document.getElementById('garment-rows').innerHTML = '';
  document.getElementById('bill-preview').style.display = 'none';
  document.getElementById('create-error').textContent = '';
  addGarmentRow();
}

function addGarmentRow() {
  const row = document.createElement('div');
  row.className = 'garment-row';
  row.innerHTML = `
    <select onchange="updatePreviewIfVisible()">
      ${Object.keys(prices).map(g => `<option>${g}</option>`).join('')}
    </select>
    <input type="number" min="1" value="1" placeholder="Qty" oninput="updatePreviewIfVisible()" />
    <button class="btn btn-danger btn-sm" onclick="this.parentElement.remove(); updatePreviewIfVisible()">✕</button>`;
  document.getElementById('garment-rows').appendChild(row);
}

function getGarmentRows() {
  return [...document.querySelectorAll('.garment-row')].map(row => ({
    name: row.querySelector('select').value,
    quantity: parseInt(row.querySelector('input').value) || 1
  }));
}

function updatePreviewIfVisible() {
  if (document.getElementById('bill-preview').style.display !== 'none') previewBill();
}

function previewBill() {
  const garments = getGarmentRows();
  if (!garments.length) return;
  let rows = '', total = 0;
  garments.forEach(g => {
    const sub = (prices[g.name] || 0) * g.quantity;
    total += sub;
    rows += `<tr><td>${g.name}</td><td>${g.quantity}</td><td>₹${prices[g.name]}</td><td>₹${sub}</td></tr>`;
  });
  const preview = document.getElementById('bill-preview');
  preview.style.display = 'block';
  preview.innerHTML = `
    <table>
      <thead><tr><th>Garment</th><th>Qty</th><th>Rate</th><th>Subtotal</th></tr></thead>
      <tbody>${rows}<tr class="total-row"><td colspan="3">Total</td><td>₹${total}</td></tr></tbody>
    </table>`;
}

async function submitOrder() {
  const customer_name = document.getElementById('c-name').value.trim();
  const phone         = document.getElementById('c-phone').value.trim();
  const garments      = getGarmentRows();
  const errEl         = document.getElementById('create-error');

  if (!customer_name) { errEl.textContent = 'Customer name is required.'; return; }
  if (!phone)         { errEl.textContent = 'Phone number is required.'; return; }
  if (!garments.length) { errEl.textContent = 'Add at least one garment.'; return; }
  errEl.textContent = '';

  const res = await apiFetch('/api/orders', 'POST', { customer_name, phone, garments });
  if (res.error) { errEl.textContent = res.error; return; }

  alert(`✅ Order placed!\nOrder ID: ${res.order_id}\nTotal: ₹${res.total_amount}\nEst. Delivery: ${res.estimated_delivery}`);
  showPage('orders');
}

// ── Status Modal ──────────────────────────────────────
function openModal(orderId, currentStatus) {
  document.getElementById('modal-order-id').value = orderId;
  document.getElementById('modal-status').value   = currentStatus;
  document.getElementById('status-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('status-modal').classList.remove('open');
}

async function confirmStatusUpdate() {
  const orderId = document.getElementById('modal-order-id').value;
  const status  = document.getElementById('modal-status').value;
  const res = await apiFetch(`/api/orders/${orderId}/status`, 'PATCH', { status });
  if (res.error) { alert(res.error); return; }
  closeModal();
  loadOrders();
  loadDashboard();
}

// ── API helper ────────────────────────────────────────
async function apiFetch(url, method = 'GET', body = null, auth = true) {
  const headers = { 'Content-Type': 'application/json' };
  if (auth && token) headers['Authorization'] = 'Bearer ' + token;
  const opts = { method, headers };
  if (body) opts.body = JSON.stringify(body);
  try {
    const res = await fetch(API + url, opts);
    return await res.json();
  } catch (e) {
    return { error: 'Network error.' };
  }
}
</script>
</body>
</html>
